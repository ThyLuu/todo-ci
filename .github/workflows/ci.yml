name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run unit tests
        run: npm test


  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest

    needs: test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -t todo-ci-demo:latest \
            .

      - name: Run Docker container
        run: |
          docker run -d \
            --name todo-container \
            -p 3000:3000 \
            todo-ci-demo:latest

      - name: Wait for application
        run: sleep 5

      - name: Check application health
        run: |
          curl --fail http://localhost:3000/todos

      - name: Show container logs
        if: always()
        run: docker logs todo-container

      - name: Stop Docker container
        if: always()
        run: docker stop todo-container